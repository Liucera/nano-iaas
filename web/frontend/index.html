<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nano-IaaS Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0c10;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 32px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid #1e2433;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }

    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    header h1 { font-size: 20px; font-weight: 600; color: #f1f5f9; }

    .badge {
      background: #1e2433;
      color: #64748b;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid #2d3748;
    }

    /* Contadores */
    .counters {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
    }

    .counter-card {
      background: #111520;
      border: 1px solid #1e2433;
      border-radius: 12px;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 180px;
      transition: border-color 0.2s;
    }

    .counter-card:hover { border-color: #2d3748; }

    .counter-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .counter-icon.gcp { background: #1a2535; }
    .counter-icon.azure { background: #111e35; }
    .counter-icon.total { background: #1a1535; }

    .counter-info { display: flex; flex-direction: column; }
    .counter-num {
      font-size: 24px;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1;
    }
    .counter-label {
      font-size: 12px;
      color: #475569;
      margin-top: 4px;
    }

    /* Botões */
    .providers {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 20px;
      border: 1px solid transparent;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn img { width: 16px; height: 16px; }

    .btn-gcp {
      background: #1a2535;
      color: #7dd3fc;
      border-color: #1e3a5f;
    }
    .btn-gcp:hover { background: #1e2e42; border-color: #2563eb; }

    .btn-azure {
      background: #111e35;
      color: #93c5fd;
      border-color: #1e3050;
    }
    .btn-azure:hover { background: #162040; border-color: #3b82f6; }

    .btn-all {
      background: #1a1535;
      color: #c4b5fd;
      border-color: #2d2050;
    }
    .btn-all:hover { background: #1e1a42; border-color: #7c3aed; }

    .btn.active { opacity: 1; box-shadow: 0 0 0 2px rgba(99,102,241,0.4); }

    /* Status */
    .status {
      font-size: 13px;
      color: #475569;
      margin-bottom: 16px;
      min-height: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status.loading { color: #f59e0b; }
    .status.success { color: #10b981; }
    .status.error   { color: #ef4444; }

    /* Tabela */
    .table-wrap {
      background: #0d1117;
      border: 1px solid #1e2433;
      border-radius: 12px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead tr { background: #111520; }

    th {
      text-align: left;
      padding: 12px 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #374151;
      border-bottom: 1px solid #1e2433;
    }

    td {
      padding: 13px 20px;
      font-size: 13px;
      color: #94a3b8;
      border-bottom: 1px solid #111520;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #0f1420; color: #cbd5e1; }

    .provider-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .provider-cell img { width: 18px; height: 18px; }

    .provider-name {
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
    }

    .type-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }

    .type-bucket   { background: #14532d33; color: #4ade80; border: 1px solid #14532d; }
    .type-container { background: #1e1b4b33; color: #a5b4fc; border: 1px solid #1e1b4b; }

    .resource-name { color: #e2e8f0; font-weight: 500; }
    .date-cell { font-family: monospace; font-size: 12px; color: #475569; }

    .empty {
      text-align: center;
      padding: 60px;
      color: #1e2433;
      font-size: 14px;
    }

    .empty-icon { font-size: 32px; margin-bottom: 12px; }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <div class="logo">☁</div>
      <h1>Nano-IaaS Dashboard</h1>
      <span class="badge">Multi-Cloud Explorer</span>
    </div>
  </header>

  <!-- Contadores -->
  <div class="counters">
    <div class="counter-card">
      <div class="counter-icon gcp">
        <img src="https://www.gstatic.com/devrel-devsite/prod/v45f61267e8070b5b50b5a44c36bf5020b5a88a6e4c7b3c7bcde4c0a7e3a49862/cloud/images/favicons/onecloud/super_cloud.png" width="24" onerror="this.replaceWith('🔵')">
      </div>
      <div class="counter-info">
        <span class="counter-num" id="cnt-gcp">—</span>
        <span class="counter-label">Google Cloud</span>
      </div>
    </div>

    <div class="counter-card">
      <div class="counter-icon azure">
        <img src="https://azure.microsoft.com/svghandler/azure-icon/?width=24&height=24" width="24" onerror="this.replaceWith('🔷')">
      </div>
      <div class="counter-info">
        <span class="counter-num" id="cnt-azure">—</span>
        <span class="counter-label">Azure</span>
      </div>
    </div>

    <div class="counter-card">
      <div class="counter-icon total">
        <span style="font-size:20px">⚡</span>
      </div>
      <div class="counter-info">
        <span class="counter-num" id="cnt-total">—</span>
        <span class="counter-label">Total de recursos</span>
      </div>
    </div>
  </div>

  <!-- Botões -->
  <div class="providers">
    <button class="btn btn-gcp" id="btn-gcp" onclick="carregar('gcp')">
      <span>🔵</span> Google Cloud
    </button>
    <button class="btn btn-azure" id="btn-azure" onclick="carregar('azure')">
      <span>🔷</span> Azure
    </button>
    <button class="btn btn-all" id="btn-all" onclick="carregarTodos()">
      <span>⚡</span> Todos
    </button>
  </div>

  <div class="status" id="status">Selecione um provider para começar.</div>

  <div class="table-wrap">
    <table id="tabela">
      <thead>
        <tr>
          <th>Provider</th>
          <th>Nome</th>
          <th>Tipo</th>
          <th>Localização / Modificado</th>
          <th>Criado</th>
        </tr>
      </thead>
      <tbody id="corpo">
        <tr>
          <td colspan="5" class="empty">
            <div class="empty-icon">☁️</div>
            Nenhum dado carregado ainda.
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    const API = 'http://127.0.0.1:8000';
    const counts = { gcp: 0, azure: 0 };

    function setStatus(msg, tipo) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + (tipo || '');
    }

    function formatDate(str) {
      if (!str || str === '—') return '—';
      try {
        return new Date(str).toLocaleDateString('pt-BR', {
          day: '2-digit', month: 'short', year: 'numeric'
        });
      } catch { return str; }
    }

    function atualizarContadores() {
      document.getElementById('cnt-gcp').textContent = counts.gcp || '—';
      document.getElementById('cnt-azure').textContent = counts.azure || '—';
      const total = counts.gcp + counts.azure;
      document.getElementById('cnt-total').textContent = total || '—';
    }

    async function carregar(provider) {
      setStatus(`Carregando ${provider.toUpperCase()}...`, 'loading');
      try {
        const res = await fetch(`${API}/list/${provider}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        counts[provider] = data.resources.length;
        atualizarContadores();
        renderizar([{ provider, resources: data.resources }]);
        setStatus(`✅ ${data.resources.length} recursos carregados — ${provider.toUpperCase()}`, 'success');
      } catch (e) {
        setStatus(`❌ Erro: ${e.message}`, 'error');
      }
    }

    async function carregarTodos() {
      setStatus('Carregando todos os providers...', 'loading');
      try {
        const [gcp, azure] = await Promise.all([
          fetch(`${API}/list/gcp`).then(r => r.json()),
          fetch(`${API}/list/azure`).then(r => r.json()),
        ]);
        counts.gcp = gcp.resources.length;
        counts.azure = azure.resources.length;
        atualizarContadores();
        renderizar([
          { provider: 'gcp', resources: gcp.resources },
          { provider: 'azure', resources: azure.resources },
        ]);
        const total = gcp.resources.length + azure.resources.length;
        setStatus(`✅ ${total} recursos carregados — GCP + Azure`, 'success');
      } catch (e) {
        setStatus(`❌ Erro: ${e.message}`, 'error');
      }
    }

    function renderizar(providers) {
      const corpo = document.getElementById('corpo');
      corpo.innerHTML = '';
      const icones = {
        gcp: '🔵',
        azure: '🔷'
      };
      providers.forEach(({ provider, resources }) => {
        resources.forEach(r => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>
              <div class="provider-cell">
                <span>${icones[provider]}</span>
                <span class="provider-name">${provider.toUpperCase()}</span>
              </div>
            </td>
            <td class="resource-name">${r.name}</td>
            <td><span class="type-badge type-${r.type}">${r.type}</span></td>
            <td class="date-cell">${r.location || formatDate(r.last_modified) || '—'}</td>
            <td class="date-cell">${formatDate(r.created) || '—'}</td>
          `;
          corpo.appendChild(tr);
        });
      });
    }
  </script>

</body>
</html>
